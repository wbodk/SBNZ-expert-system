# nginx konfiguracija za Angular SPA + reverse proxy ka backend servisu.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API -> Spring Boot servis (ime servisa iz docker-compose mreže).
    # Upstream se razrešava lenjo (Docker-ov DNS 127.0.0.11) po zahtevu, da nginx
    # ne padne pri startu ako backend kontejner još nije podignut.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sbnz_backend backend;
        proxy_pass http://$sbnz_backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — sve ostalo na index.html (Angular routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
